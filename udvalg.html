<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slikshop</title>
    <link rel="stylesheet" href="slikshop.css" />
    <!-- ref til FontAwesomes stylesheet (så jeg kan bruge deres ikoner)-->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <!-- Her har jeg hentet font fra google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Genos:ital,wght@0,100..900;1,100..900&family=Titan+One&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header>
      <div class="logo">
        <a href="index.html">
          <img src="test-logo.png" alt="sky-logo" />
        </a>
      </div>

      <div class="topnav" id="myTopnav">
        <a href="udvalg.html">Udvalg</a>
        <a href="omos.html">Om os</a>
        <a href="#">Butikker</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="javascript:void(0);" class="icon" onclick="myFunction()">
          <i class="fa fa-bars"></i>
        </a>
      </div>
    </header>

    <h1>Udvalg</h1>

    <div id="udvalgListe"></div>

    <template>
      <div class="product">
        <h2 id="navn"></h2>
        <img id="billede" src="" alt="" />
        <div id="pris"></div>
        <div id="vægt"></div>
        <button class="addToCart">Køb</button>
      </div>
    </template>

    <footer>
      <div class="slik-kasse">
        <img src="lilleslik.png" alt="tegning-af-slik" />
      </div>

      <div class="footerInfoBoks">
        <div class="footerInfo">
          <h4>Åbningstider:</h4>
          <div class="footerInfoHours">
            <p>Mandag - Fredag: 10:00 - 18:00</p>
            <p>Lørdag: 10:00 - 16:00</p>
            <p>Søndag: Lukket</p>
          </div>
        </div>
      </div>

      <div class="adresse">
        <h4>Adresse:</h4>
        <p>Eksempelgade 1, 1234 København</p>
        <h4>Kontakt:</h4>
        <p>
          info@sukkerskyen.dk <br />
          +45 12345678
        </p>
      </div>

      <div class="container-footer-logo">
        <div class="instagram-logo">
          <a href="#">
            <img
              src="—Pngtree—instagram icon vector_8704817.png"
              alt="insta-logo"
            />
          </a>
        </div>

        <div class="facebook-logo">
          <a href="#">
            <img src="Popular-facebook-Logo-png.png" alt="facebook-logo" />
          </a>
        </div>

        <div class="tiktok-logo">
          <a href="#">
            <img
              src="vecteezy_tiktok-png-icon_16716485.png"
              alt="tiktok-logo"
            />
          </a>
        </div>
      </div>
    </footer>

    <script src="udvalg.js"></script>
  </body>
</html>
